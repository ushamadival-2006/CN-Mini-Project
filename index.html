<!DOCTYPE html>
<html>
<head>
    <title>Chat App</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #121212;
            color: white;
        }

        .container {
            width: 420px;
            height: 650px;
            margin: 20px auto;
            background: #1e1e1e;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .center {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            padding: 20px;
        }

        input {
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }

        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .header {
            padding: 15px;
            background: #4CAF50;
            text-align: center;
            font-weight: bold;
        }

        .messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .bubble {
            max-width: 70%;
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
        }

        .me {
            background: #4CAF50;
            align-self: flex-end;
        }

        .other {
            background: #333;
            align-self: flex-start;
        }

        .system {
            text-align: center;
            font-size: 12px;
            color: gray;
        }

        .input-box {
            display: flex;
            padding: 10px;
            background: #1e1e1e;
        }

        .input-box input {
            flex: 1;
        }

        .file-btn {
            background: #2196F3;
            margin-left: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- LOGIN -->
    <div id="login" class="center">
        <h2>Join Chat</h2>
        <input id="username" placeholder="Username">
        <input id="room" placeholder="Room">
        <button onclick="joinChat()">Join</button>
    </div>

    <!-- CHAT -->
    <div id="chat" class="chat">
        <div class="header" id="roomTitle"></div>
        <div class="messages" id="messages"></div>

        <div class="input-box">
            <input id="msgInput" placeholder="Type message...">
            <button onclick="sendMessage()">Send</button>
            <button class="file-btn" onclick="sendFile()">📂</button>
        </div>
    </div>

</div>

<script>
    let username = "";
    let room = "";
    let socket;

    const messages = document.getElementById("messages");

    function joinChat() {
        username = document.getElementById("username").value;
        room = document.getElementById("room").value;

        if (!username || !room) {
            alert("Enter username and room");
            return;
        }

        socket = new WebSocket("ws://localhost:12345");

        socket.onopen = () => {
            socket.send(username);
            socket.send(room);
        };

        socket.onmessage = (event) => {
            const data = event.data;

            if (data.startsWith("FILE|")) {
                const parts = data.split("|");
                const filename = parts[1];
                const filedata = parts[2];

                const link = document.createElement("a");
                link.href = filedata;
                link.download = filename;
                link.innerText = "📂 Download " + filename;

                const msg = document.createElement("div");
                msg.className = "bubble other";
                msg.appendChild(link);

                messages.appendChild(msg);
                messages.scrollTop = messages.scrollHeight;

            } else {
                addMessage(data, "other");
            }
        };

        document.getElementById("login").style.display = "none";
        document.getElementById("chat").style.display = "flex";
        document.getElementById("roomTitle").innerText = "💬 " + room;

        addSystem("Connected to server");
    }

    function addMessage(text, type) {
        const msg = document.createElement("div");
        msg.className = "bubble " + type;

        const time = new Date().toLocaleTimeString();
        msg.innerText = text + " (" + time + ")";

        messages.appendChild(msg);
        messages.scrollTop = messages.scrollHeight;
    }

    function addSystem(text) {
        const msg = document.createElement("div");
        msg.className = "system";
        msg.innerText = "🔔 " + text;
        messages.appendChild(msg);
    }

    function sendMessage() {
        const input = document.getElementById("msgInput");
        const text = input.value;

        if (text && socket) {
            socket.send(text);
            addMessage("You: " + text, "me");
            input.value = "";
        }
    }

    function sendFile() {
        const input = document.createElement("input");
        input.type = "file";

        input.onchange = () => {
            const file = input.files[0];

            // 🚨 SIZE LIMIT FIX
            if (file.size > 200000) {
                alert("File too large! Use smaller file (<200KB)");
                return;
            }

            const reader = new FileReader();
            reader.onload = () => {
                socket.send("FILE|" + file.name + "|" + reader.result);
                addSystem("You sent file: " + file.name);
            };

            reader.readAsDataURL(file);
        };

        input.click();
    }

    document.addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
